entity.sarwis_search_point.collection:
  path: '/admin/content/sarwis-search-points'
  defaults:
    _entity_list: 'sarwis_search_point'
    _title: 'SARWIS Search Points'
  requirements:
    _permission: 'view sarwis search point'

entity.sarwis_search_point.add_form:
  path: '/admin/content/sarwis-search-points/add'
  defaults:
    _entity_form: 'sarwis_search_point.add'
    _title: 'Add SARWIS Search Point'
  requirements:
    _permission: 'add sarwis search point'

entity.sarwis_search_point.canonical:
  path: '/sarwis-search-point/{sarwis_search_point}'
  defaults:
    _entity_view: 'sarwis_search_point.full'
    _title_callback: '\Drupal\Core\Entity\Controller\EntityController::title'
  requirements:
    _permission: 'view sarwis search point'
  options:
    parameters:
      sarwis_search_point:
        type: 'entity:sarwis_search_point'

entity.sarwis_search_point.edit_form:
  path: '/sarwis-search-point/{sarwis_search_point}/edit'
  defaults:
    _entity_form: 'sarwis_search_point.edit'
    _title_callback: '\Drupal\Core\Entity\Controller\EntityController::editTitle'
  requirements:
    _permission: 'edit sarwis search point'
  options:
    parameters:
      sarwis_search_point:
        type: 'entity:sarwis_search_point'

entity.sarwis_search_point.delete_form:
  path: '/sarwis-search-point/{sarwis_search_point}/delete'
  defaults:
    _entity_form: 'sarwis_search_point.delete'
    _title: 'Delete'
  requirements:
    _permission: 'delete sarwis search point'
  options:
    parameters:
      sarwis_search_point:
        type: 'entity:sarwis_search_point'

entity.sarwis_search_point.settings:
  path: '/admin/structure/sarwis-search-point/settings'
  defaults:
    _controller: '\Drupal\sarwis\Controller\SarwisSearchPointController::settings'
    _title: 'SARWIS Search Point Settings'
  requirements:
    _permission: 'administer sarwis search point'
